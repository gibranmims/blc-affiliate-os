<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLC OS — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #f7f4f0; color: #0a0a0a; font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #ffffff; border: 1px solid rgba(0,0,0,0.08); border-radius: 16px; padding: 44px 40px; width: 100%; max-width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .logo { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #9a8f85; margin-bottom: 28px; font-weight: 600; }
    h1 { margin: 0 0 6px; font-size: 26px; font-weight: 800; letter-spacing: -0.03em; }
    .sub { font-size: 14px; color: #9a8f85; margin: 0 0 28px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #4a4540; margin-bottom: 6px; letter-spacing: 0.02em; text-transform: uppercase; }
    input[type="password"] { width: 100%; background: #f7f4f0; border: 1.5px solid rgba(0,0,0,0.1); border-radius: 8px; padding: 11px 13px; font-size: 14px; color: #0a0a0a; font-family: inherit; outline: none; }
    input[type="password"]:focus { border-color: #C8956A; box-shadow: 0 0 0 3px rgba(200,149,106,0.15); }
    .btn { width: 100%; margin-top: 16px; padding: 13px; background: #0a0a0a; color: #ffffff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; letter-spacing: -0.01em; transition: background 0.15s; }
    .btn:hover { background: #1a1a1a; }
    .error { display: none; margin-top: 12px; padding: 10px 13px; background: rgba(220,38,38,.08); border: 1px solid rgba(220,38,38,.2); border-radius: 8px; font-size: 13px; color: #dc2626; }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">The Bikini Line Co.</div>
    <h1>Sign in to BLC OS</h1>
    <p class="sub">Internal team access only.</p>
    <form id="login-form">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter team password" autofocus>
      <button type="submit" class="btn">Sign In</button>
      <div class="error" id="error-msg">Incorrect password. Try again.</div>
    </form>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error-msg');
      errEl.classList.remove('show');
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        if (res.ok) {
          const params = new URLSearchParams(window.location.search);
          window.location.href = params.get('redirect') || '/';
        } else {
          errEl.classList.add('show');
        }
      } catch {
        errEl.classList.add('show');
      }
    });
  </script>
</body>
</html>
