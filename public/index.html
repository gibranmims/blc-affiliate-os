<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLC OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-mark">blc</div>
          <div class="logo-text-group">
            <span class="logo-name">OS</span>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">WORKSPACE</div>
        <a href="#" class="nav-item active" data-page="outreach">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </span>
          <span>Outreach</span>
        </a>
        <div class="nav-group" id="nav-group-roster">
          <a href="#" class="nav-item nav-group-trigger" data-page="roster">
            <span class="nav-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
            </span>
            <span>Roster</span>
            <span class="nav-chevron">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </span>
          </a>
          <div class="nav-sub" id="nav-sub-roster">
            <a href="#" class="nav-sub-item" data-roster-tab="paid">Paid Affiliates</a>
            <a href="#" class="nav-sub-item" data-roster-tab="free">Free Affiliates</a>
          </div>
        </div>

        <a href="#" class="nav-item" data-page="review">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
          </span>
          <span>For Review</span>
          <span class="nav-review-badge" id="review-badge" style="display:none">0</span>
        </a>

        <a href="#" class="nav-item" data-page="finance">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
          </span>
          <span>Finance</span>
        </a>

        <a href="#" class="nav-item" data-page="support">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          </span>
          <span>Support</span>
          <span class="nav-support-badge" id="support-badge" style="display:none">0</span>
        </a>

        <div class="nav-section-label" style="margin-top: 20px;">CREATIVE LAB</div>
        <a href="#" class="nav-item nav-cl-item" data-scripts-tab="creators">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          </span>
          <span>Creators</span>
        </a>
        <a href="#" class="nav-item nav-cl-item" data-scripts-tab="write">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </span>
          <span>Write Script</span>
          <span class="nav-badge">AI</span>
        </a>
        <a href="#" class="nav-item nav-cl-item" data-scripts-tab="rewrite">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
          </span>
          <span>Rewrite Script</span>
          <span class="nav-badge">AI</span>
        </a>
        <a href="#" class="nav-item nav-cl-item" data-scripts-tab="analyzer">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <span>Script Analyzer</span>
          <span class="nav-badge">AI</span>
        </a>
        <a href="#" class="nav-item nav-cl-item" data-scripts-tab="library">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
          </span>
          <span>Script Library</span>
        </a>

        <div class="nav-section-label" style="margin-top: 20px;">BBL CHALLENGE</div>
        <a href="#" class="nav-item" data-page="challenge">
          <span class="nav-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          </span>
          <span>Challenge Tracker</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-footer-text">The Bikini Line Co.</div>
        <button class="sidebar-settings-btn" onclick="openSettingsModal()" title="App Settings">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div id="page-content" class="page-content">
        <div class="loading-screen">
          <div class="spinner"></div>
          <p>Loading BLC OS...</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="handleOverlayClick(event)">
    <div class="modal" id="modal-box">
      <div class="modal-header">
        <h2 id="modal-title" class="modal-title"></h2>
        <button class="modal-close" onclick="closeModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Detail Panel (creator drawer) -->
  <div id="detail-panel" class="detail-panel" style="display:none">
    <div class="detail-overlay" onclick="closeDetailPanel()"></div>
    <div class="detail-drawer">
      <div class="detail-drawer-header">
        <span class="detail-drawer-title" id="detail-drawer-title"></span>
        <button class="detail-close-btn" onclick="closeDetailPanel()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="detail-drawer-body" id="detail-drawer-body"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script src="/js/app.js"></script>
</body>
</html>
