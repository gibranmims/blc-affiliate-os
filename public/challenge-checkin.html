<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBL Challenge Check-In</title>
  <link rel="icon" type="image/svg+xml" href="/img/blc-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #FFFBF8; color: #33261F; font-family: 'Poppins', sans-serif; min-height: 100vh; padding: 40px 20px 80px; }
    .container { max-width: 500px; margin: 0 auto; }
    .brand { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; color: #E2734D; margin-bottom: 32px; }
    .week-tag { display: inline-block; padding: 4px 12px; background: rgba(226,115,77,.1); border: 1px solid rgba(226,115,77,.28); border-radius: 20px; font-size: 11.5px; font-weight: 500; color: #C05A32; margin-bottom: 14px; }
    h1 { margin: 0 0 8px; font-size: 26px; font-weight: 700; }
    .greeting { font-size: 14px; color: #7A6A60; margin: 0 0 28px; }
    .card { background: #FFFFFF; border: 1px solid rgba(51,38,31,.1); border-radius: 14px; padding: 28px; box-shadow: 0 8px 32px -14px rgba(51,38,31,.12); }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 12px; font-weight: 500; color: #7A6A60; margin-bottom: 8px; }
    .radio-group { display: flex; gap: 10px; }
    .radio-option { flex: 1; }
    .radio-option input[type="radio"] { display: none; }
    .radio-option label {
      display: block; padding: 11px 14px; background: #FBF6F2; border: 1.5px solid rgba(51,38,31,.15);
      border-radius: 8px; font-size: 13.5px; font-weight: 500; color: #7A6A60;
      cursor: pointer; text-align: center; transition: all .15s; margin: 0;
    }
    .radio-option input[type="radio"]:checked + label { border-color: #E2734D; color: #B3502F; background: rgba(226,115,77,.08); }
    textarea { width: 100%; background: #FFFFFF; border: 1px solid rgba(51,38,31,.18); border-radius: 8px; padding: 11px 13px; font-size: 14px; color: #33261F; font-family: inherit; outline: none; resize: vertical; min-height: 80px; }
    textarea:focus { border-color: #E2734D; box-shadow: 0 0 0 3px rgba(226,115,77,.12); }
    textarea::placeholder { color: #A39387; }
    .photo-drop { background: #FBF6F2; border: 1.5px dashed rgba(51,38,31,.22); border-radius: 10px; padding: 28px 20px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; position: relative; }
    .photo-drop:hover, .photo-drop.drag-over { border-color: #E2734D; background: rgba(226,115,77,.05); }
    .photo-drop input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .photo-drop-icon { font-size: 24px; margin-bottom: 8px; }
    .photo-drop-text { font-size: 13px; color: #7A6A60; }
    .photo-drop-text strong { color: #33261F; }
    .photo-drop-hint { font-size: 11px; color: #A39387; margin-top: 4px; }
    .photo-preview { display: none; margin-top: 10px; }
    .photo-preview img { max-width: 100%; max-height: 180px; border-radius: 8px; object-fit: cover; }
    .photo-preview-label { font-size: 11.5px; color: #1E9E5A; margin-bottom: 6px; }
    .btn { width: 100%; margin-top: 4px; padding: 13px; background: #E2734D; color: #FFFFFF; border: none; border-radius: 8px; font-size: 14.5px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .15s; }
    .btn:hover:not(:disabled) { background: #D3603B; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .error { display: none; margin-top: 12px; padding: 10px 13px; background: rgba(179,64,42,.08); border: 1px solid rgba(179,64,42,.25); border-radius: 8px; font-size: 13px; color: #B3402A; }
    .error.show { display: block; }
    .state-screen { display: none; padding: 10px 0; }
    .state-screen.show { display: block; }
    .state-icon { font-size: 36px; margin-bottom: 14px; color: #E2734D; }
    .state-screen h2 { font-size: 20px; font-weight: 700; margin: 0 0 10px; }
    .state-screen p { font-size: 14px; color: #7A6A60; line-height: 1.65; margin: 0; }
    .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.35); border-top-color: #FFFFFF; border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-screen { text-align: center; padding: 60px 0; color: #A39387; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">The Bikini Line Co.</div>
    <div id="main-content">
      <div class="loading-screen">Loading your check-in...</div>
    </div>
  </div>

  <script>
    const token = window.location.pathname.split('/').pop();

    async function init() {
      const main = document.getElementById('main-content');
      try {
        const res = await fetch(`/api/challenge/checkin-info/${token}`);
        const info = await res.json();

        if (!res.ok) {
          main.innerHTML = stateScreen('Link not found', 'This check-in link is invalid or has expired.');
          return;
        }

        if (info.status === 'disqualified') {
          main.innerHTML = stateScreen('Entry closed', 'Your challenge entry has been closed due to a missed check-in window.');
          return;
        }

        if (info.already_submitted) {
          main.innerHTML = stateScreen('Already submitted', `Your Week ${info.week_number} check-in has been received. Look out for your next check-in email!`);
          return;
        }

        if (info.window_closed) {
          main.innerHTML = stateScreen('Window closed', 'This check-in window has closed. Unfortunately this entry is no longer eligible for the refund.');
          return;
        }

        if (!info.window_open) {
          const openDate = new Date(info.opens_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
          main.innerHTML = stateScreen('Not yet open', `Your Week ${info.week_number} check-in opens on ${openDate}. We'll send you a reminder email when it's time.`);
          return;
        }

        // Show the form
        const deadlineDate = new Date(info.closes_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
        main.innerHTML = `
          <div class="week-tag">Week ${info.week_number} Check-In</div>
          <h1>How are you progressing?</h1>
          <p class="greeting">Hey ${info.challenger_name || 'there'} — snap a progress photo and fill in your check-in below. Deadline: <strong style="color:#E2734D">${deadlineDate}</strong>.</p>

          <div class="card">
            <form id="checkin-form">
              <div class="form-group">
                <label>Week ${info.week_number} progress photo</label>
                <div class="photo-drop" id="photo-drop">
                  <input type="file" id="photo" name="photo" accept=".jpg,.jpeg,.png,.webp,.heic" required>
                  <div class="photo-drop-icon">+</div>
                  <div class="photo-drop-text"><strong>Tap to upload your progress photo</strong></div>
                  <div class="photo-drop-hint">JPG, PNG, WEBP or HEIC · Max 10 MB</div>
                </div>
                <div class="photo-preview" id="photo-preview">
                  <div class="photo-preview-label">Photo selected ✓</div>
                  <img id="preview-img" src="" alt="Progress photo preview">
                </div>
              </div>

              <div class="form-group">
                <label>Have you been using the BBL Serum every night?</label>
                <div class="radio-group">
                  <div class="radio-option">
                    <input type="radio" id="yes" name="used_consistently" value="true" required>
                    <label for="yes">Yes, every night</label>
                  </div>
                  <div class="radio-option">
                    <input type="radio" id="no" name="used_consistently" value="false">
                    <label for="no">Not every night</label>
                  </div>
                </div>
              </div>

              <div class="form-group">
                <label for="notes">Notes (optional)</label>
                <textarea id="notes" name="notes" placeholder="Any changes you've noticed, skin reactions, or feedback for us..."></textarea>
              </div>

              <div class="error" id="error-msg"></div>
              <button type="submit" class="btn" id="submit-btn">
                <span id="btn-text">Submit Week ${info.week_number} Check-In</span>
                <div class="spinner" id="btn-spinner"></div>
              </button>
            </form>

            <div class="state-screen" id="success-screen">
              <div class="state-icon">✓</div>
              <h2>${info.week_number === 8 ? 'Challenge complete!' : 'Check-in received!'}</h2>
              <p>${info.week_number === 8
                ? 'You completed all four check-ins! Our team is reviewing your submission and will process your $39.99 refund shortly.'
                : `Week ${info.week_number} is in the books. Your next check-in email arrives in 2 weeks. Keep using your BBL Serum every night!`
              }</p>
            </div>
          </div>
        `;

        // Wire up photo preview
        const photoInput = document.getElementById('photo');
        const preview = document.getElementById('photo-preview');
        const previewImg = document.getElementById('preview-img');
        const photoDrop = document.getElementById('photo-drop');

        photoInput.addEventListener('change', () => {
          const file = photoInput.files[0];
          if (file) {
            previewImg.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            photoDrop.style.display = 'none';
          }
        });

        photoDrop.addEventListener('dragover', e => { e.preventDefault(); photoDrop.classList.add('drag-over'); });
        photoDrop.addEventListener('dragleave', () => photoDrop.classList.remove('drag-over'));
        photoDrop.addEventListener('drop', e => {
          e.preventDefault();
          photoDrop.classList.remove('drag-over');
          if (e.dataTransfer.files[0]) {
            const dt = new DataTransfer();
            dt.items.add(e.dataTransfer.files[0]);
            photoInput.files = dt.files;
            photoInput.dispatchEvent(new Event('change'));
          }
        });

        // Wire up form submit
        document.getElementById('checkin-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const btn = document.getElementById('submit-btn');
          const btnText = document.getElementById('btn-text');
          const spinner = document.getElementById('btn-spinner');
          const errEl = document.getElementById('error-msg');

          errEl.classList.remove('show');
          btn.disabled = true;
          btnText.style.display = 'none';
          spinner.style.display = 'block';

          try {
            const formData = new FormData(document.getElementById('checkin-form'));
            const res = await fetch(`/api/challenge/checkin/${token}`, { method: 'POST', body: formData });
            const json = await res.json();
            if (res.ok) {
              document.getElementById('checkin-form').style.display = 'none';
              document.getElementById('success-screen').classList.add('show');
            } else {
              errEl.textContent = json.error || 'Something went wrong. Please try again.';
              errEl.classList.add('show');
              btn.disabled = false;
              btnText.style.display = '';
              spinner.style.display = 'none';
            }
          } catch {
            errEl.textContent = 'Network error. Please check your connection and try again.';
            errEl.classList.add('show');
            btn.disabled = false;
            btnText.style.display = '';
            spinner.style.display = 'none';
          }
        });

      } catch (err) {
        main.innerHTML = stateScreen('Something went wrong', 'Please try refreshing the page. If the issue persists, reply to your check-in email.');
      }
    }

    function stateScreen(title, message) {
      return `
        <div style="padding:20px 0">
          <h1 style="margin:0 0 10px;font-size:22px">${title}</h1>
          <p style="font-size:14px;color:#7A6A60;line-height:1.65;margin:0">${message}</p>
        </div>
      `;
    }

    init();
  </script>
</body>
</html>
